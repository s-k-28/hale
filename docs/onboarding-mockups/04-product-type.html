<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HALE · 04 Product Type</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 40px; gap: 24px; }
  .caption { font-family: var(--font-body); color: var(--ash); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .caption strong { color: var(--volt); font-weight: 700; }

  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .progress.is-top { flex: 1; }
  .qmeta { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--volt); margin-bottom: 12px; }
  .qhead { font-family: var(--font-display); font-size: 52px; line-height: 0.92; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 8px; }
  .qsub { font-family: var(--font-body); font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--ash); margin-bottom: 28px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .frame-mark { position: absolute; top: 80px; right: 32px; font-family: var(--font-display); font-size: 80px; color: rgba(255,255,255,0.025); letter-spacing: -0.05em; line-height: 0.8; pointer-events: none; z-index: 1; }
  .frame-mark small { display: block; font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(198,255,61,0.15); margin-top: 6px; }
  .cta-wrap { margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>
  <div class="caption">04 · Product Type <strong>·</strong> Act 2 · Quiz (1/8)</div>

  <div class="phone">
    <div class="statusbar">
      <span class="statusbar-time">9:41</span>
      <span class="statusbar-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M9 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM3.5 7.5a8 8 0 0111 0M1 4.5a12 12 0 0116 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="grain"></div>
    <div class="phone-content">
      <div class="frame-mark">04<small>TYPE</small></div>

      <div class="topbar">
        <button class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="progress is-top">
          <span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <div class="qmeta">Question 1 / 7</div>
      <h1 class="qhead">What are you<br>quitting?</h1>
      <p class="qsub">No judgment. Pick what's been the main pull.</p>

      <div class="options">
        <button class="option selected">
          <div class="option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h11l3 3v-6l-3 3M19 8v8M22 10v4"/></svg>
          </div>
          <div class="option-text">
            <div class="option-label">Vape / e-cig</div>
            <div class="option-sub">Pods, disposables, mods</div>
          </div>
          <div class="option-check"></div>
        </button>

        <button class="option">
          <div class="option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="9" width="12" height="6" rx="1"/><path d="M9 6v3M15 6v3M9 15v3M15 15v3"/></svg>
          </div>
          <div class="option-text">
            <div class="option-label">Nicotine pouches</div>
            <div class="option-sub">Zyn, Velo, On!, Rogue</div>
          </div>
          <div class="option-check"></div>
        </button>

        <button class="option">
          <div class="option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 14h14l2-2-2-2H3z M19 11v2 M21 12h-1"/></svg>
          </div>
          <div class="option-text">
            <div class="option-label">Cigarettes</div>
            <div class="option-sub">Pack a day or less</div>
          </div>
          <div class="option-check"></div>
        </button>

        <button class="option">
          <div class="option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 7l10 10M17 7L7 17M12 3v18"/></svg>
          </div>
          <div class="option-text">
            <div class="option-label">A mix of things</div>
            <div class="option-sub">Two or more of the above</div>
          </div>
          <div class="option-check"></div>
        </button>
      </div>

      <div class="cta-wrap">
        <button class="btn-primary">Continue →</button>
      </div>
    </div>
  </div>

  <div class="caption">05 NEXT · DAILY USAGE</div>
</body>
</html>
