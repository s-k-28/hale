<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HALE · 07 Triggers</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 40px; gap: 24px; }
  .caption { font-family: var(--font-body); color: var(--ash); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .caption strong { color: var(--volt); font-weight: 700; }

  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .progress.is-top { flex: 1; }
  .skip { font-family: var(--font-body); font-weight: 700; font-size: 12px; letter-spacing: 0.06em; color: var(--ash); text-transform: uppercase; background: none; border: none; cursor: pointer; }
  .skip:hover { color: var(--chalk); }

  .qmeta { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--volt); margin-bottom: 12px; }
  .qhead { font-family: var(--font-display); font-size: 48px; line-height: 0.92; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 8px; }
  .qsub { font-family: var(--font-body); font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--ash); margin-bottom: 24px; }
  .qsub b { color: var(--chalk); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    background: var(--coal);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    color: var(--chalk);
    cursor: pointer;
    letter-spacing: -0.005em;
    transition: all 0.12s ease;
  }
  .chip:hover { border-color: var(--volt-edge); }
  .chip.selected { background: var(--volt-soft); border-color: var(--volt); color: var(--volt); }
  .chip-icon { font-size: 16px; line-height: 1; }
  .selected-count { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--volt); margin-top: 18px; }
  .selected-count b { color: var(--chalk); font-family: var(--font-display); font-size: 16px; }

  .frame-mark { position: absolute; top: 80px; right: 32px; font-family: var(--font-display); font-size: 80px; color: rgba(255,255,255,0.025); letter-spacing: -0.05em; line-height: 0.8; pointer-events: none; z-index: 1; }
  .frame-mark small { display: block; font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(198,255,61,0.15); margin-top: 6px; }
  .cta-wrap { margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>
  <div class="caption">07 · Triggers <strong>·</strong> Act 2 · Quiz (4/8) · Skippable</div>

  <div class="phone">
    <div class="statusbar">
      <span class="statusbar-time">9:41</span>
      <span class="statusbar-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M9 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM3.5 7.5a8 8 0 0111 0M1 4.5a12 12 0 0116 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="grain"></div>
    <div class="phone-content">
      <div class="frame-mark">07<small>TRIGGERS</small></div>

      <div class="topbar">
        <button class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="progress is-top">
          <span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <button class="skip">Skip</button>
      </div>

      <div class="qmeta">Question 4 / 7</div>
      <h1 class="qhead">When do cravings<br>hit hardest?</h1>
      <p class="qsub">Pick as many as you want. We'll <b>arm you for those exact moments</b>.</p>

      <div class="chips">
        <button class="chip selected"><span class="chip-icon">⚡</span> Stress</button>
        <button class="chip"><span class="chip-icon">☕</span> Morning coffee</button>
        <button class="chip selected"><span class="chip-icon">🌙</span> After dinner</button>
        <button class="chip"><span class="chip-icon">🍻</span> Drinking</button>
        <button class="chip"><span class="chip-icon">🚗</span> Driving</button>
        <button class="chip selected"><span class="chip-icon">📱</span> Doomscrolling</button>
        <button class="chip"><span class="chip-icon">😶</span> Boredom</button>
        <button class="chip"><span class="chip-icon">💼</span> Work breaks</button>
        <button class="chip"><span class="chip-icon">🛌</span> Before bed</button>
        <button class="chip"><span class="chip-icon">👥</span> Around smokers</button>
        <button class="chip"><span class="chip-icon">🍔</span> After meals</button>
        <button class="chip"><span class="chip-icon">🥵</span> Hangovers</button>
      </div>

      <div class="selected-count"><b>3</b> selected · pick a few more if it helps</div>

      <div class="cta-wrap">
        <button class="btn-primary">Continue →</button>
      </div>
    </div>
  </div>

  <div class="caption">08 NEXT · HARDEST HOUR</div>
</body>
</html>
