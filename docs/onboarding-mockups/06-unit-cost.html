<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HALE · 06 Unit Cost</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 40px; gap: 24px; }
  .caption { font-family: var(--font-body); color: var(--ash); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .caption strong { color: var(--volt); font-weight: 700; }

  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .progress.is-top { flex: 1; }
  .qmeta { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--volt); margin-bottom: 12px; }
  .qhead { font-family: var(--font-display); font-size: 52px; line-height: 0.92; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 8px; }
  .qsub { font-family: var(--font-body); font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--ash); margin-bottom: 32px; }

  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .price-btn {
    background: var(--coal);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .price-btn:hover { border-color: var(--volt-edge); }
  .price-btn.selected { background: var(--volt-soft); border-color: var(--volt); }
  .price-currency { font-family: var(--font-body); font-weight: 700; font-size: 11px; color: var(--ash); letter-spacing: 0.08em; text-transform: uppercase; }
  .price-val { font-family: var(--font-display); font-size: 36px; line-height: 1; color: var(--chalk); letter-spacing: -0.03em; }
  .price-btn.selected .price-val { color: var(--volt); }
  .price-unit { font-family: var(--font-body); font-weight: 500; font-size: 10px; color: var(--ash); letter-spacing: 0.05em; }

  /* Calculation reveal */
  .calc {
    margin-top: 24px;
    padding: 20px;
    background: linear-gradient(135deg, rgba(198,255,61,0.10), rgba(198,255,61,0));
    border: 1px solid var(--volt-edge);
    border-radius: 22px;
    position: relative;
    overflow: hidden;
  }
  .calc-label { font-family: var(--font-body); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--volt); margin-bottom: 6px; }
  .calc-big { font-family: var(--font-display); font-size: 56px; line-height: 1; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 4px; }
  .calc-big span { color: var(--volt); }
  .calc-tag { font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--ash); }
  .calc-tag b { color: var(--chalk); }

  .frame-mark { position: absolute; top: 80px; right: 32px; font-family: var(--font-display); font-size: 80px; color: rgba(255,255,255,0.025); letter-spacing: -0.05em; line-height: 0.8; pointer-events: none; z-index: 1; }
  .frame-mark small { display: block; font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(198,255,61,0.15); margin-top: 6px; }
  .cta-wrap { margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>
  <div class="caption">06 · Unit Cost <strong>·</strong> Act 2 · Quiz (3/8)</div>

  <div class="phone">
    <div class="statusbar">
      <span class="statusbar-time">9:41</span>
      <span class="statusbar-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M9 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM3.5 7.5a8 8 0 0111 0M1 4.5a12 12 0 0116 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="grain"></div>
    <div class="phone-content">
      <div class="frame-mark">06<small>COST</small></div>

      <div class="topbar">
        <button class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="progress is-top">
          <span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <div class="qmeta">Question 3 / 7</div>
      <h1 class="qhead">What's a<br>pod cost?</h1>
      <p class="qsub">Roughly. We round up because nicotine taxes are real.</p>

      <div class="price-grid">
        <button class="price-btn"><span class="price-currency">USD</span><div class="price-val">$1</div><span class="price-unit">/pod</span></button>
        <button class="price-btn"><span class="price-currency">USD</span><div class="price-val">$2</div><span class="price-unit">/pod</span></button>
        <button class="price-btn selected"><span class="price-currency">USD</span><div class="price-val">$4</div><span class="price-unit">/pod</span></button>
        <button class="price-btn"><span class="price-currency">USD</span><div class="price-val">$6</div><span class="price-unit">/pod</span></button>
        <button class="price-btn"><span class="price-currency">USD</span><div class="price-val">$8</div><span class="price-unit">/pod</span></button>
        <button class="price-btn"><span class="price-currency">USD</span><div class="price-val">$10+</div><span class="price-unit">/pod</span></button>
      </div>

      <div class="calc">
        <div class="calc-label">Your habit costs</div>
        <div class="calc-big">$<span>14,600</span></div>
        <div class="calc-tag">per year · <b>that's a used Civic.</b> Every year. Burning.</div>
      </div>

      <div class="cta-wrap">
        <button class="btn-primary">Continue →</button>
      </div>
    </div>
  </div>

  <div class="caption">07 NEXT · TRIGGERS</div>
</body>
</html>
