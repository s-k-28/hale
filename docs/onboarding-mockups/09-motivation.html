<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HALE · 09 Motivation</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 40px; gap: 24px; }
  .caption { font-family: var(--font-body); color: var(--ash); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .caption strong { color: var(--volt); font-weight: 700; }

  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .progress.is-top { flex: 1; }
  .skip { font-family: var(--font-body); font-weight: 700; font-size: 12px; letter-spacing: 0.06em; color: var(--ash); text-transform: uppercase; background: none; border: none; cursor: pointer; }

  .qmeta { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--volt); margin-bottom: 12px; }
  .qhead { font-family: var(--font-display); font-size: 48px; line-height: 0.92; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 8px; }
  .qsub { font-family: var(--font-body); font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--ash); margin-bottom: 24px; }

  .motive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .motive {
    background: var(--coal);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
  }
  .motive:hover { border-color: var(--volt-edge); }
  .motive.selected { background: var(--volt-soft); border-color: var(--volt); }
  .motive-emoji { font-size: 24px; }
  .motive-label { font-family: var(--font-headline); font-weight: 800; font-size: 14px; color: var(--chalk); letter-spacing: -0.005em; line-height: 1.2; }
  .motive.selected .motive-label { color: var(--volt); }

  .write-own {
    padding: 16px;
    background: var(--coal);
    border: 1px dashed var(--line);
    border-radius: 18px;
    display: flex; align-items: center; gap: 12px;
    color: var(--ash);
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
  }
  .write-own:hover { border-color: var(--volt-edge); color: var(--chalk); }
  .write-own svg { color: var(--volt); }

  .frame-mark { position: absolute; top: 80px; right: 32px; font-family: var(--font-display); font-size: 80px; color: rgba(255,255,255,0.025); letter-spacing: -0.05em; line-height: 0.8; pointer-events: none; z-index: 1; }
  .frame-mark small { display: block; font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(198,255,61,0.15); margin-top: 6px; }
  .cta-wrap { margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>
  <div class="caption">09 · Motivation <strong>·</strong> Act 2 · Quiz (6/8) · Skippable</div>

  <div class="phone">
    <div class="statusbar">
      <span class="statusbar-time">9:41</span>
      <span class="statusbar-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M9 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM3.5 7.5a8 8 0 0111 0M1 4.5a12 12 0 0116 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="grain"></div>
    <div class="phone-content">
      <div class="frame-mark">09<small>WHY</small></div>

      <div class="topbar">
        <button class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="progress is-top">
          <span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <button class="skip">Skip</button>
      </div>

      <div class="qmeta">Question 6 / 7</div>
      <h1 class="qhead">Why are you<br>doing this?</h1>
      <p class="qsub">We'll save it. Read it back on Day 3 when your hands shake.</p>

      <div class="motive-grid">
        <button class="motive selected">
          <span class="motive-emoji">🫁</span>
          <span class="motive-label">My lungs are toast</span>
        </button>
        <button class="motive">
          <span class="motive-emoji">💸</span>
          <span class="motive-label">Pure money rage</span>
        </button>
        <button class="motive">
          <span class="motive-emoji">👶</span>
          <span class="motive-label">For my kid</span>
        </button>
        <button class="motive">
          <span class="motive-emoji">💪</span>
          <span class="motive-label">Reclaiming control</span>
        </button>
        <button class="motive">
          <span class="motive-emoji">😶‍🌫️</span>
          <span class="motive-label">Brain fog, gone</span>
        </button>
        <button class="motive">
          <span class="motive-emoji">🏃</span>
          <span class="motive-label">Athletic comeback</span>
        </button>
      </div>

      <button class="write-own">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19l7-7-3-3-7 7v3h3z"/><path d="M5 18l1 1"/></svg>
        Write your own reason →
      </button>

      <div class="cta-wrap">
        <button class="btn-primary">Continue →</button>
      </div>
    </div>
  </div>

  <div class="caption">10 NEXT · FIRST NAME</div>
</body>
</html>
