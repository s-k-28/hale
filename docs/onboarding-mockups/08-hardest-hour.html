<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HALE · 08 Hardest Hour</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 40px; gap: 24px; }
  .caption { font-family: var(--font-body); color: var(--ash); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; }
  .caption strong { color: var(--volt); font-weight: 700; }

  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .progress.is-top { flex: 1; }

  .qmeta { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--volt); margin-bottom: 12px; }
  .qhead { font-family: var(--font-display); font-size: 50px; line-height: 0.92; letter-spacing: -0.03em; color: var(--chalk); margin-bottom: 8px; }
  .qsub { font-family: var(--font-body); font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--ash); margin-bottom: 28px; }

  .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .time-btn {
    background: var(--coal);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .time-btn:hover { border-color: var(--volt-edge); }
  .time-btn.selected { background: var(--volt-soft); border-color: var(--volt); }
  .time-hour { font-family: var(--font-display); font-size: 36px; line-height: 1; color: var(--chalk); letter-spacing: -0.02em; }
  .time-btn.selected .time-hour { color: var(--volt); }
  .time-hour span { font-size: 16px; vertical-align: top; color: var(--ash); margin-left: 4px; }
  .time-label { font-family: var(--font-body); font-weight: 700; font-size: 11px; color: var(--ash); letter-spacing: 0.1em; text-transform: uppercase; }

  /* mini clock face decoration in selected */
  .time-btn.selected::after {
    content: '';
    position: absolute;
    right: -20px; bottom: -20px;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1px solid var(--volt-edge);
  }

  .future-promise {
    margin-top: 20px;
    padding: 16px;
    border-left: 2px solid var(--volt);
    padding-left: 16px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    color: var(--ash);
    line-height: 1.5;
  }
  .future-promise b { color: var(--chalk); font-family: var(--font-headline); font-weight: 800; }
  .future-promise em { font-style: normal; color: var(--volt); font-weight: 600; }

  .frame-mark { position: absolute; top: 80px; right: 32px; font-family: var(--font-display); font-size: 80px; color: rgba(255,255,255,0.025); letter-spacing: -0.05em; line-height: 0.8; pointer-events: none; z-index: 1; }
  .frame-mark small { display: block; font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(198,255,61,0.15); margin-top: 6px; }
  .cta-wrap { margin-top: auto; padding-top: 16px; }
</style>
</head>
<body>
  <div class="caption">08 · Hardest Hour <strong>·</strong> Act 2 · Quiz (5/8)</div>

  <div class="phone">
    <div class="statusbar">
      <span class="statusbar-time">9:41</span>
      <span class="statusbar-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M9 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM3.5 7.5a8 8 0 0111 0M1 4.5a12 12 0 0116 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="grain"></div>
    <div class="phone-content">
      <div class="frame-mark">08<small>HOUR</small></div>

      <div class="topbar">
        <button class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="progress is-top">
          <span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <div class="qmeta">Question 5 / 7</div>
      <h1 class="qhead">What's your<br>hardest hour?</h1>
      <p class="qsub">The time you'd kill for a hit. We'll be there.</p>

      <div class="clock-grid">
        <button class="time-btn"><div class="time-hour">7<span>AM</span></div><div class="time-label">Morning rush</div></button>
        <button class="time-btn"><div class="time-hour">10<span>AM</span></div><div class="time-label">Mid-morning</div></button>
        <button class="time-btn"><div class="time-hour">12<span>PM</span></div><div class="time-label">Lunch break</div></button>
        <button class="time-btn"><div class="time-hour">3<span>PM</span></div><div class="time-label">Afternoon slump</div></button>
        <button class="time-btn"><div class="time-hour">6<span>PM</span></div><div class="time-label">After work</div></button>
        <button class="time-btn selected"><div class="time-hour">9<span>PM</span></div><div class="time-label">Wind-down</div></button>
        <button class="time-btn"><div class="time-hour">11<span>PM</span></div><div class="time-label">Late night</div></button>
        <button class="time-btn"><div class="time-hour">2<span>AM</span></div><div class="time-label">Insomnia hours</div></button>
      </div>

      <div class="future-promise">
        Every night at <em>9:00 PM</em>, you'll get a check-in <b>before the craving lands</b>. That's the difference.
      </div>

      <div class="cta-wrap">
        <button class="btn-primary">Continue →</button>
      </div>
    </div>
  </div>

  <div class="caption">09 NEXT · MOTIVATION</div>
</body>
</html>
