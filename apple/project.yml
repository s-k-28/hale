name: Hale
options:
  bundleIdPrefix: com.ravipulavarthy
  deploymentTarget:
    iOS: "26.0"   # Liquid Glass baseline — glassEffect/GlassEffectContainer used ungated
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only (supportsTablet: false)
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    # --- Code signing ---------------------------------------------------------
    # Automatic signing with the Apple Developer team that owns the bundle id
    # (com.ravipulavarthy.hale), the App Group group.com.ravipulavarthy.hale.onesignal,
    # and the Push Notifications capability. Set DEVELOPMENT_TEAM to that team's
    # 10-character Team ID (Apple Developer ▸ Membership ▸ Team ID). Leaving it
    # blank is fine for simulator builds; a device archive/TestFlight upload
    # requires it (or pick the team in Xcode ▸ Signing & Capabilities, which
    # writes it back here on next `xcodegen generate` only if committed).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "CPRVLR97XJ"        # Ravi Pulavarthy team (from local Apple Development cert OU)
    # Simulator SDK never signs, so the headless build recipe never prompts and
    # stays green with no team; device SDK signs automatically per the above.
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
packages:
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    exactVersion: 0.8.1
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  OneSignal:
    url: https://github.com/OneSignal/OneSignal-iOS-SDK
    from: "5.0.0"
  Pow:
    url: https://github.com/movingparts-io/Pow
    from: "1.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
targets:
  Hale:
    type: application
    platform: iOS
    sources:
      - path: Hale
      - path: HaleShared          # snapshot + App Group store + Live Activity attributes
    dependencies:
      - package: ConvexMobile
        product: ConvexMobile
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog
      - package: Sentry
        product: Sentry
      - package: OneSignal
        product: OneSignalFramework
      - package: Pow
        product: Pow
      - package: Lottie
        product: Lottie
      - target: OneSignalNotificationServiceExtension
      - target: HaleWidgets       # WidgetKit + Live Activity extension (auto-embedded)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale
        INFOPLIST_FILE: Hale/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Device/release: the APNs + app-group entitlements. Ignored on the
        # unsigned simulator build (CODE_SIGNING_ALLOWED=NO above).
        CODE_SIGN_ENTITLEMENTS: Hale/Hale.entitlements
    scheme:
      testTargets:
        - HaleTests
        - HaleUITests
  OneSignalNotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OneSignalNotificationServiceExtension
    dependencies:
      # Rich-push handler. OneSignalExtension transitively links OneSignalCore
      # + OneSignalOutcomes, which is all the NSE needs.
      - package: OneSignal
        product: OneSignalExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.OneSignalNotificationServiceExtension
        INFOPLIST_FILE: OneSignalNotificationServiceExtension/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "10"
        CODE_SIGN_ENTITLEMENTS: OneSignalNotificationServiceExtension/NSE.entitlements
  HaleWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HaleWidgets
      - path: HaleShared            # same snapshot/store/attributes as the app
      - path: Hale/Resources/Fonts  # bundle Sora so widget type stays on-brand
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.HaleWidgets
        INFOPLIST_FILE: HaleWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "10"
        CODE_SIGN_ENTITLEMENTS: HaleWidgets/HaleWidgets.entitlements
  HaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HaleTests
    dependencies:
      - target: Hale
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.tests
  HaleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HaleUITests
    dependencies:
      - target: Hale
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.uitests
