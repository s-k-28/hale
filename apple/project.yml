name: Hale
options:
  bundleIdPrefix: com.ravipulavarthy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only (supportsTablet: false)
    CODE_SIGNING_ALLOWED: "NO"            # simulator builds — no team needed
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
# Sentry + OneSignal temporarily omitted: their SPM packages download binary
# XCFrameworks from github.com release assets, which triggers a keychain ACL prompt
# on this machine that can't be answered headless. Their wrapper code is guarded by
# #if canImport(...) so it activates automatically once the packages are re-added
# (after clicking "Always Allow" on the keychain prompt once).
packages:
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    exactVersion: 0.8.1
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
targets:
  Hale:
    type: application
    platform: iOS
    sources:
      - path: Hale
    dependencies:
      - package: ConvexMobile
        product: ConvexMobile
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog
      - target: OneSignalNotificationServiceExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale
        INFOPLIST_FILE: Hale/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Device/release: the APNs + app-group entitlements. Ignored on the
        # unsigned simulator build (CODE_SIGNING_ALLOWED=NO above).
        CODE_SIGN_ENTITLEMENTS: Hale/Hale.entitlements
    scheme:
      testTargets:
        - HaleTests
  OneSignalNotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OneSignalNotificationServiceExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.OneSignalNotificationServiceExtension
        INFOPLIST_FILE: OneSignalNotificationServiceExtension/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "10"
        CODE_SIGN_ENTITLEMENTS: OneSignalNotificationServiceExtension/NSE.entitlements
  HaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HaleTests
    dependencies:
      - target: Hale
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.ravipulavarthy.hale.tests
